<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home - Bootcamp</title>
<link rel="stylesheet" href="./css/index.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a class="navbar-brand" href="#">Bootcamp</a>
      <div class="collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="./pages/productos.html">Productos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="./pages/formulario.html">Formulario</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  
  <main class="container mt-5">
    <h1>Bienvenido al Home</h1>
    <p>Esta es la página principal del bootcamp.</p>
  </main>

  <section class="container">
    <h2>Login</h2>
    <form method="post" class="login-form" id="loginForm">
      <div class="mb-3">
        <label for="email" class="form-label">Usuario</label>
        <input type="text" id="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" id="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary">Ingresar</button>
      <button type="reset" class="btn btn-primary">Limpiar</button>
    </form>
  </section>

  <footer>
    <div class="container text-center">
      <p>&copy; 2026 Bootcamp. Todos los derechos reservados.</p>
    </div>
  </footer>



  <script src="./js/index.js"></script>
</body>
</html>

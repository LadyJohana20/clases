<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario de Producto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/formulario.css">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a class="navbar-brand" href="#">Bootcamp</a>
      <div class="collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="../index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="./productos.html">Productos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="./formulario.html">Formulario</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>


  <h1 id="userAdmin">
    
  </h1>

  <button type="button" id="cerrar">Cerrar Sesión</button>


  <h1>Agregar Producto</h1>
  <form action="#" method="post" id="formProductos">
    <label for="nombre">Nombre del producto:</label>
    <input type="text" id="nombre" name="nombre" required>

    <label for="precio">Precio:</label>
    <input type="number" id="precio" name="precio" min="1" required>

    <label for="stock">Stock:</label>
    <input type="number" id="stock" name="stock" min="1" required>

    <button type="submit">Guardar</button>
  </form>

  <script src="../js/formulario.cjs"></script>
</body>
</html>
